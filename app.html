<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SyncWave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="app-body">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="workspace-info">
        <div class="workspace-icon">SW</div>
        <div>
          <div class="workspace-name">SyncWave</div>
          <div class="workspace-status">
            <span class="status-dot online"></span>
            <span id="onlineCount">1 online</span>
          </div>
        </div>
      </div>
      <button class="icon-btn" id="themeToggle" title="Toggle theme">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" id="themeIcon">
          <circle cx="8" cy="8" r="3.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.05 3.05l1.06 1.06M11.89 11.89l1.06 1.06M3.05 12.95l1.06-1.06M11.89 4.11l1.06-1.06" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="sidebar-section">
      <div class="section-header">
        <span>Channels</span>
        <button class="icon-btn" id="addChannelBtn" title="New channel">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <ul class="channel-list" id="channelList"></ul>
    </div>

    <div class="sidebar-section">
      <div class="section-header"><span>Direct Messages</span></div>
      <ul class="dm-list" id="dmList"></ul>
    </div>

    <div class="sidebar-footer">
      <div class="user-self" id="userSelf">
        <div class="avatar" id="selfAvatar"></div>
        <div class="user-self-info">
          <div class="user-self-name" id="selfName"></div>
          <div class="user-self-status">● Active</div>
        </div>
        <button class="icon-btn" id="logoutBtn" title="Sign out">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3M10 11l3-3-3-3M13 8H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- Main Chat Area -->
  <main class="chat-main" id="chatMain">
    <div class="chat-header" id="chatHeader">
      <div class="chat-header-info">
        <button class="icon-btn mobile-menu-btn" id="mobileMenuBtn">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 4h14M2 9h14M2 14h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <span class="channel-prefix" id="channelPrefix">#</span>
        <span class="channel-title" id="channelTitle">general</span>
        <span class="channel-desc" id="channelDesc">General discussion</span>
      </div>
      <div class="chat-header-actions">
        <button class="icon-btn" id="searchBtn" title="Search">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <button class="icon-btn" id="membersToggle" title="Members">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="6" cy="5" r="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M1 13c0-2.76 2.24-5 5-5s5 2.24 5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="12" cy="5" r="2" stroke="currentColor" stroke-width="1.3"/><path d="M14 13c0-1.93-1.12-3.6-2.75-4.4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        </button>
        <button class="icon-btn btn-ai" id="aiBtn" title="Ask AI assistant">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2C4.69 2 2 4.69 2 8s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6z" stroke="currentColor" stroke-width="1.5"/><path d="M5.5 8.5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><circle cx="8" cy="10" r="1" fill="currentColor"/></svg>
        </button>
      </div>
    </div>

    <!-- Search bar (hidden by default) -->
    <div class="search-bar" id="searchBar" style="display:none">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4" stroke="currentColor" stroke-width="1.4"/><path d="M9 9L12 12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Search messages…" />
      <button class="icon-btn" id="searchClose">✕</button>
    </div>

    <!-- Messages -->
    <div class="messages-container" id="messagesContainer">
      <div class="messages-list" id="messagesList"></div>
      <div class="typing-indicator" id="typingIndicator" style="display:none">
        <div class="typing-dots"><span></span><span></span><span></span></div>
        <span id="typingText"></span>
      </div>
    </div>

    <!-- Input -->
    <div class="chat-input-area" id="chatInputArea">
      <div class="file-preview" id="filePreview" style="display:none">
        <div class="file-preview-inner" id="filePreviewInner"></div>
        <button class="icon-btn" id="clearFile">✕</button>
      </div>
      <div class="input-row">
        <button class="icon-btn attach-btn" id="attachBtn" title="Attach file">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M15 9.5l-6.5 6.5a4.5 4.5 0 0 1-6.36-6.36l7.07-7.07a3 3 0 0 1 4.24 4.24l-7.08 7.07a1.5 1.5 0 0 1-2.12-2.12l6.37-6.36" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <input type="file" id="fileInput" style="display:none" accept="image/*,.pdf,.txt,.md,.js,.ts,.py,.json" />
        <textarea class="message-input" id="messageInput" placeholder="Message #general…" rows="1"></textarea>
        <button class="icon-btn emoji-btn" id="emojiBtn" title="Emoji">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="1.4"/><circle cx="6.5" cy="7.5" r="1" fill="currentColor"/><circle cx="11.5" cy="7.5" r="1" fill="currentColor"/><path d="M6 11.5s1 1.5 3 1.5 3-1.5 3-1.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </button>
        <button class="send-btn" id="sendBtn" title="Send">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M16 2L2 7l5.5 4.5L16 2zM7.5 11.5L9 16l3-5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <!-- Emoji picker -->
      <div class="emoji-picker" id="emojiPicker" style="display:none">
        <div class="emoji-grid" id="emojiGrid"></div>
      </div>
    </div>
  </main>

  <!-- Members panel -->
  <aside class="members-panel" id="membersPanel">
    <div class="members-header">Members</div>
    <div class="members-online">
      <div class="members-section-label">Online — <span id="onlineCountPanel">0</span></div>
      <ul class="members-list" id="onlineList"></ul>
    </div>
    <div class="members-offline">
      <div class="members-section-label">Offline — <span id="offlineCountPanel">0</span></div>
      <ul class="members-list" id="offlineList"></ul>
    </div>
  </aside>

  <!-- Add Channel Modal -->
  <div class="modal-overlay" id="addChannelModal" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <span>New Channel</span>
        <button class="icon-btn" id="closeChannelModal">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Channel Name</label>
          <input type="text" class="form-input" id="newChannelName" placeholder="e.g. frontend-devs" />
        </div>
        <div class="form-group">
          <label class="form-label">Description (optional)</label>
          <input type="text" class="form-input" id="newChannelDesc" placeholder="What's this channel about?" />
        </div>
        <div class="form-group">
          <label class="form-label">Type</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="channelType" value="public" checked /> Public
            </label>
            <label class="radio-label">
              <input type="radio" name="channelType" value="private" /> Private
            </label>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" id="cancelChannelModal">Cancel</button>
        <button class="btn-primary" id="confirmAddChannel">Create Channel</button>
      </div>
    </div>
  </div>

  <!-- AI Modal -->
  <div class="modal-overlay" id="aiModal" style="display:none">
    <div class="modal modal-wide">
      <div class="modal-header">
        <span>AI Assistant <span class="badge-demo">DEMO</span></span>
        <button class="icon-btn" id="closeAiModal">✕</button>
      </div>
      <div class="modal-body">
        <div class="ai-chat" id="aiChatHistory"></div>
        <div class="ai-input-row">
          <input type="text" class="form-input" id="aiInput" placeholder="Ask anything about this channel…" />
          <button class="btn-primary compact" id="aiSend">Ask</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Notification toast -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Mobile overlay -->
  <div class="mobile-overlay" id="mobileOverlay"></div>

  <script src="js/mock-db.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
